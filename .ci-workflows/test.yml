name: test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (unit + integration)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      docker:
        image: docker:dind
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -B verify
        working-directory: backend
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/**/target/surefire-reports/

  frontend-e2e:
    name: frontend Playwright (smoke + a11y + flow)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium firefox
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npm run test:e2e
        working-directory: frontend
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results

  full-e2e:
    name: full-stack E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'run-full-e2e')
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: taskq
          POSTGRES_USER: taskq
          POSTGRES_PASSWORD: taskq_dev_pw
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U taskq"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: mvn -B -DskipTests package
        working-directory: backend
      - run: nohup java -jar app/target/reach-taskq.jar > app.log 2>&1 &
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
          REDIS_HOST: localhost
      - run: npm ci && npx playwright install --with-deps chromium
        working-directory: frontend
      - name: wait for app
        run: node frontend/e2e/full/wait-for-backend.mjs
      - run: npm run test:e2e:full
        working-directory: frontend
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: |
            frontend/playwright-report-e2e
            frontend/test-results
            backend/app.log

pg_stat_statements:
  query: |
    SELECT
      d.datname,
      pg_get_userbyid(s.userid) AS user,
      LEFT(regexp_replace(s.query, '\s+', ' ', 'g'), 80) AS query_short,
      s.calls AS calls,
      s.total_exec_time / 1000 AS total_time_seconds,
      s.mean_exec_time / 1000 AS mean_time_seconds,
      s.max_exec_time / 1000 AS max_time_seconds,
      s.rows AS rows
    FROM pg_stat_statements s
    JOIN pg_database d ON d.oid = s.dbid
    WHERE d.datname = current_database()
    ORDER BY s.total_exec_time DESC
    LIMIT 20
  master: true
  metrics:
    - datname:
        usage: "LABEL"
        description: "Database name"
    - user:
        usage: "LABEL"
        description: "Role that ran the query"
    - query_short:
        usage: "LABEL"
        description: "First 80 chars of normalized query"
    - calls:
        usage: "COUNTER"
        description: "Number of times executed"
    - total_time_seconds:
        usage: "COUNTER"
        description: "Total time spent in the query, in seconds"
    - mean_time_seconds:
        usage: "GAUGE"
        description: "Mean time spent per call, in seconds"
    - max_time_seconds:
        usage: "GAUGE"
        description: "Max time observed for a single call, in seconds"
    - rows:
        usage: "COUNTER"
        description: "Total rows retrieved or affected"

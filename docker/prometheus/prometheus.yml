global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: reach-taskq

scrape_configs:
  - job_name: taskq-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["app:8080"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
